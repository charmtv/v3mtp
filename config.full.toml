# ==============================================================================
#
#   TELEMT — 基于 Rust 的高级 Telegram MTProto 代理
#   完整配置参考
#
#   本文件既是工作配置也是完整文档。
#   每个参数都有说明。部署前请从头到尾阅读。
#
#   快速开始：
#     1. 设置 [server].port 为你需要的端口（推荐 443）
#     2. 生成密钥：openssl rand -hex 16
#     3. 将密钥放入 [access.users] 并命名
#     4. 设置 [censorship].tls_domain 为一个流行的未被封锁的 HTTPS 网站
#     5. 在 [general].middle_proxy_nat_ip 和 [general.links].public_host 中设置公网 IP
#     6. 在 [[server.listeners]] 中设置 announce IP
#     7. 运行 Telemt。它会打印 tg:// 链接，发送给你的用户。
#
#   运行模式：
#     直连模式 (use_middle_proxy = false)
#       直接通过 TCP 连接到 Telegram DC。简单、快速、低开销。
#       不支持 ad_tag。不支持 CDN DC（203 等）。
#
#     Middle-Proxy 模式 (use_middle_proxy = true)
#       通过 RPC 协议连接到 Telegram Middle-End 服务器。
#       广告标签变现和 CDN 支持所必需。
#       需要 proxy_secret_path 和有效的公网 IP。
#
# ==============================================================================


# ==============================================================================
# 旧版顶级字段
# ==============================================================================

# 已弃用。请使用 [general.links].show 代替。
# 接受 "*" 表示所有用户，或数组如 ["alice", "bob"]。
show_link = ["0"]

# 备用数据中心索引（1-5），当客户端请求未知 DC ID 时使用。
# DC 2 是阿姆斯特丹（欧洲），对大多数用户最近。
# default_dc = 2


# ==============================================================================
# 基本设置
# ==============================================================================

[general]

# ------------------------------------------------------------------------------
# 核心协议
# ------------------------------------------------------------------------------

# 将 MTProto 握手和第一个数据载荷合并到单个 TCP 数据包中。
# 显著降低连接延迟。没有理由禁用。
fast_mode = true

# 代理如何连接到 Telegram 服务器。
# false = 直接 TCP 连接到 Telegram DC（简单、低开销）
# true  = Middle-End RPC 协议（广告标签和 CDN DC 所必需）
use_middle_proxy = true

# 从 @MTProxybot 获取的 32 字符 HEX 广告标签，用于赞助频道注入。
# 仅在 use_middle_proxy = true 时有效。
# 获取方式：在 Telegram 上向 @MTProxybot 发消息，注册你的代理。
# ad_tag = "00000000000000000000000000000000"

# ------------------------------------------------------------------------------
# Middle-End 认证
# ------------------------------------------------------------------------------

# Telegram 基础设施 AES 密钥文件路径。
# 首次运行时自动从 https://core.telegram.org/getProxySecret 下载。
# 此密钥用于向 Middle-End 服务器认证你的代理。
proxy_secret_path = "proxy-secret"

# ------------------------------------------------------------------------------
# 公网 IP 配置（Middle-Proxy 模式关键设置）
# ------------------------------------------------------------------------------

# 你服务器的公网 IPv4 地址。
# Middle-End 服务器需要此地址用于密钥派生函数。
# 如果服务器有直接公网 IP，在此设置。
# 如果在 NAT 后面（AWS、Docker 等），此处必须是你的外部 IP。
# 如果省略，Telemt 使用 STUN 自动检测（见 middle_proxy_nat_probe）。
# middle_proxy_nat_ip = "203.0.113.10"

# 通过 [network] 中定义的 STUN 服务器自动检测公网 IP。
# 如果已硬编码 middle_proxy_nat_ip，设为 false。
# 如果需要自动检测，设为 true。
middle_proxy_nat_probe = true

# ------------------------------------------------------------------------------
# Middle-End 连接池
# ------------------------------------------------------------------------------

# 到 ME 服务器的持久复用 RPC 连接数。
# 所有客户端流量通过这些"胖管道"路由。
# 8 个连接可以舒适地处理数千并发用户。
middle_proxy_pool_size = 8

# 旧版字段。保持初始化但空闲的热备连接。
middle_proxy_warm_standby = 16

# ------------------------------------------------------------------------------
# Middle-End 心跳保活
# Telegram ME 服务器会主动关闭空闲 TCP 连接。
# 这些设置发送周期性 RPC_PING 帧以保持管道活跃。
# ------------------------------------------------------------------------------

me_keepalive_enabled = true

# ping 之间的基础间隔（秒）。
me_keepalive_interval_secs = 25

# 添加到间隔的随机抖动，防止所有连接同时 ping。
me_keepalive_jitter_secs = 5

# 随机化 ping 载荷字节，防止 DPI 指纹识别 ping 模式。
me_keepalive_payload_random = true

# ------------------------------------------------------------------------------
# 客户端限制
# ------------------------------------------------------------------------------

# 上游慢时每个客户端的最大缓冲密文（字节）。
# 作为背压防止内存耗尽。256KB 是安全的。
crypto_pending_buffer = 262144

# 客户端的最大单个 MTProto 帧大小。16MB 是协议标准。
max_client_frame = 16777216

# ------------------------------------------------------------------------------
# 加密去同步日志
# 去同步错误通常意味着 DPI/GFW 正在篡改连接。
# ------------------------------------------------------------------------------

# true  = 每个去同步事件的完整取证（跟踪 ID、IP 哈希、十六进制转储）
# false = 去重日志，每个时间窗口一条（防止日志泛滥）
# 如果正在调试 DPI 干扰，设为 true。
desync_all_full = true

# ------------------------------------------------------------------------------
# Beobachten — 内置蜜罐/主动探测跟踪器
# 跟踪握手失败或行为类似 TLS 扫描器的 IP。
# 输出文件可以馈入 fail2ban 或 iptables 进行自动封锁。
# ------------------------------------------------------------------------------

beobachten = true

# 在过期前记住可疑 IP 的时间（分钟）。
beobachten_minutes = 30

# 将跟踪器状态刷新到磁盘的频率（秒）。
beobachten_flush_secs = 15

# 跟踪器输出的文件路径。
beobachten_file = "cache/beobachten.txt"

# ------------------------------------------------------------------------------
# Hardswap — 零停机 ME 池轮换
# 当 Telegram 更新 ME 服务器 IP 时，Hardswap 创建完全新的池，
# 等待完全就绪，迁移流量，然后关闭旧池。
# 用户体验零中断。
# ------------------------------------------------------------------------------

hardswap = true

# ------------------------------------------------------------------------------
# ME 池预热错开
# 创建新池时，连接逐个打开并带延迟，
# 避免 SYN 数据包突发触发 ISP 洪水保护。
# ------------------------------------------------------------------------------

me_warmup_stagger_enabled = true

# 每个连接创建之间的延迟（毫秒）。
me_warmup_step_delay_ms = 500

# 添加到延迟的随机抖动（毫秒）。
me_warmup_step_jitter_ms = 300

# ------------------------------------------------------------------------------
# ME 重连退避
# 如果 ME 服务器断开连接，Telemt 使用此策略重试。
# ------------------------------------------------------------------------------

# 每个 DC 的最大同时重连尝试数。
me_reconnect_max_concurrent_per_dc = 8

# 指数退避基数（毫秒）。
me_reconnect_backoff_base_ms = 500

# 退避上限（毫秒）。等待时间不会超过此值。
me_reconnect_backoff_cap_ms = 30000

# 切换到指数退避前的即时重试次数。
me_reconnect_fast_retry_count = 12

# ------------------------------------------------------------------------------
# NAT 不匹配行为
# 如果 STUN 检测到的 IP 与本地接口 IP 不同（你在 NAT 后面）。
# false = 中止 ME 模式（安全默认值）
# true  = 强制 ME 模式（如果你知道 NAT 设置正确则使用）
# ------------------------------------------------------------------------------

stun_iface_mismatch_ignore = false

# ------------------------------------------------------------------------------
# 日志
# ------------------------------------------------------------------------------

# 记录未知 DC 请求（标准 1-5 之外的 DC ID）的文件。
unknown_dc_log_path = "unknown-dc.txt"

# 详细程度："debug" | "verbose" | "normal" | "silent"
log_level = "normal"

# 禁用日志输出中的 ANSI 颜色代码（用于文件日志记录）。
disable_colors = false

# ------------------------------------------------------------------------------
# FakeTLS 记录大小
# 将小的 MTProto 数据包缓冲到更大的 TLS 记录中以模拟真实 HTTPS。
# 真实 HTTPS 服务器发送接近 MTU 大小（~1400 字节）的记录。
# 一系列小型 TLS 记录是强烈的 DPI 信号。
# 设为 0 禁用。设为 1400 以实现逼真的 HTTPS 模拟。
# ------------------------------------------------------------------------------

fast_mode_min_tls_record = 1400

# ------------------------------------------------------------------------------
# 周期性更新
# ------------------------------------------------------------------------------

# 从 core.telegram.org 重新获取 ME 服务器列表和代理密钥的频率（秒）。
# 保持代理与 Telegram 基础设施同步。
update_every = 300

# 即使 ME 映射未更改，也强制 Hardswap 的频率（秒）。
# 更短的间隔意味着更短寿命的 TCP 流，更难被 DPI 分析。
me_reinit_every_secs = 600

# ------------------------------------------------------------------------------
# Hardswap 预热调优
# 精细控制新池在流量切换前的预热方式。
# ------------------------------------------------------------------------------

me_hardswap_warmup_delay_min_ms = 1000
me_hardswap_warmup_delay_max_ms = 2000
me_hardswap_warmup_extra_passes = 3
me_hardswap_warmup_pass_backoff_base_ms = 500

# ------------------------------------------------------------------------------
# 配置更新去抖
# Telegram 有时推送临时/损坏的配置。去抖要求
# N 次连续相同的获取才应用更改。
# ------------------------------------------------------------------------------

# ME 服务器列表必须在此次获取中保持相同才应用。
me_config_stable_snapshots = 2

# 配置应用之间的最小秒数。
me_config_apply_cooldown_secs = 300

# 代理密钥必须在此次获取中保持相同才应用。
proxy_secret_stable_snapshots = 2

# ------------------------------------------------------------------------------
# 代理密钥轮换
# ------------------------------------------------------------------------------

# 运行时应用新下载的密钥，无需重启。
proxy_secret_rotate_runtime = true

# 最大可接受密钥长度（字节）。拒绝异常大的密钥。
proxy_secret_len_max = 256

# ------------------------------------------------------------------------------
# Hardswap 排空设置
# 控制池轮换期间旧 ME 连接的优雅关闭。
# ------------------------------------------------------------------------------

# 强制关闭前保持旧连接活跃以处理传输中数据的秒数。
me_pool_drain_ttl_secs = 90

# 新池中健康连接的最小比例，才开始排空旧池。
# 0.8 = 新池至少 80% 必须就绪。
me_pool_min_fresh_ratio = 0.8

# 排空完成前的最大等待秒数，之后强制终止。
me_reinit_drain_timeout_secs = 120

# ------------------------------------------------------------------------------
# NTP 时钟检查
# MTProto 使用时间戳。时钟偏差 > 30 秒会破坏握手。
# Telemt 在启动时检查并在不同步时发出警告。
# ------------------------------------------------------------------------------

ntp_check = true
ntp_servers = ["pool.ntp.org"]

# ------------------------------------------------------------------------------
# 自动降级
# 如果 ME 服务器完全不可达（ISP 封锁），
# 自动回退到直连模式以保持用户连接。
# ------------------------------------------------------------------------------

auto_degradation_enabled = true

# 触发回退前必须不可达的 DC 组数。
degradation_min_unavailable_dc_groups = 2


# ==============================================================================
# 允许的客户端协议
# 只启用你需要的。在审查地区，仅 TLS 最安全。
# ==============================================================================

[general.modes]

# 经典 MTProto。未混淆的长度前缀。DPI 可轻易检测。
# 除非有古老客户端，否则没有理由启用。
classic = false

# 带随机填充的混淆 MTProto。比经典好，但
# 仍可通过数据包大小的统计分析检测。
secure = false

# FakeTLS（ee-密钥）。将 MTProto 包装在 TLS 1.3 帧中。
# 对 DPI 来说，看起来像正常的 HTTPS 连接。
# 在审查环境中应该是唯一启用的模式。
tls = true


# ==============================================================================
# 启动链接生成
# 控制启动时打印到控制台的 tg:// 邀请链接。
# ==============================================================================

[general.links]

# 为哪些用户生成链接。
# "*" = 所有用户，或数组如 ["alice", "bob"]。
show = "*"

# 嵌入 tg:// 链接中的 IP 或域名。
# 如果省略，Telemt 使用 STUN 自动检测。
# 设置为你服务器的公网 IP 或域名以获得可靠链接。
# public_host = "proxy.example.com"

# 嵌入 tg:// 链接中的端口。
# 如果省略，使用 [server].port。
# public_port = 443


# ==============================================================================
# 网络 & IP 解析
# ==============================================================================

[network]

# 启用 IPv4 出站连接到 Telegram。
ipv4 = true

# 启用 IPv6 出站连接到 Telegram。
ipv6 = false

# 两者都可用时优先使用 IPv4 (4) 或 IPv6 (6)。
prefer = 4

# 实验性：同时使用 IPv4 和 IPv6 ME 服务器。
# 可能提高可靠性但会翻倍连接数。
multipath = false

# 用于外部 IP 发现的 STUN 服务器。
# 用于 Middle-Proxy KDF（如 nat_probe=true）和链接生成。
stun_servers = [
    "stun.l.google.com:5349",
    "stun1.l.google.com:3478",
    "stun.gmx.net:3478",
    "stun.l.google.com:19302"
]

# 如果 UDP STUN 被阻止，尝试基于 TCP 的 STUN 作为回退。
stun_tcp_fallback = true

# 如果所有 STUN 失败，使用 HTTP API 发现公网 IP。
http_ip_detect_urls = [
    "https://ifconfig.me/ip",
    "https://api.ipify.org"
]

# 将发现的公网 IP 缓存到此文件以在重启后保留。
cache_public_ip_path = "cache/public_ip.txt"


# ==============================================================================
# 服务器绑定 & 指标
# ==============================================================================

[server]

# 监听的 TCP 端口。
# 推荐 443（看起来像正常的 HTTPS 流量）。
port = 443

# IPv4 绑定地址。"0.0.0.0" = 所有接口。
listen_addr_ipv4 = "0.0.0.0"

# IPv6 绑定地址。"::" = 所有接口。
listen_addr_ipv6 = "::"

# Unix 套接字监听器（用于 Nginx/HAProxy 反向代理设置）。
# listen_unix_sock = "/var/run/telemt.sock"
# listen_unix_sock_perm = "0660"

# 启用 PROXY 协议头解析。
# 仅在 Telemt 位于注入 PROXY 头的 HAProxy/Nginx 后面时设为 true。
# 如果前面没有代理就启用，客户端将无法连接。
proxy_protocol = false

# Prometheus 指标 HTTP 端点端口。
# 取消注释以启用。通过 http://your-server:9090/metrics 访问
# metrics_port = 9090

# 允许访问指标端点的 IP 范围。
metrics_whitelist = [
    "127.0.0.1/32",
    "::1/128"
]

# ------------------------------------------------------------------------------
# 监听器覆盖
# 定义具有特定绑定 IP 和公告 IP 的显式监听器。
# 公告 IP 嵌入 tg:// 链接并发送到 ME 服务器。
# 要使 ME 模式工作，必须将 announce 设置为服务器的公网 IP。
# ------------------------------------------------------------------------------

# [[server.listeners]]
# ip = "0.0.0.0"
# announce = "203.0.113.10"
# reuse_allow = false


# ==============================================================================
# 超时设置（秒，除非另有说明）
# ==============================================================================

[timeouts]

# 客户端完成 FakeTLS + MTProto 握手的最大时间。
client_handshake = 15

# 建立到上游 Telegram DC 的 TCP 连接的最大时间。
tg_connect = 10

# 客户端连接的 TCP 心跳保活间隔。
client_keepalive = 60

# 客户端最大不活跃时间，超时则断开连接。
client_ack = 300

# 放弃前对单个 ME 端点的即时重试次数。
me_one_retry = 3

# 单个 ME 端点连接尝试的超时时间（毫秒）。
me_one_timeout_ms = 1500


# ==============================================================================
# 反审查 / FakeTLS / 伪装
# 这是 Telemt 对深度包检测变得隐形的地方。
# ==============================================================================

[censorship]

# ------------------------------------------------------------------------------
# TLS 域名前端伪装
# 你的代理向连接客户端展示的 SNI（服务器名称指示）。
# 必须是目标国家流行的、未被封锁的 HTTPS 网站。
# DPI 看到的是到此域名的流量。请谨慎选择。
# 好的选择：大型 CDN、银行、政府网站、搜索引擎。
# 坏的选择：小众网站、已被封锁的域名。
# ------------------------------------------------------------------------------

tls_domain = "www.google.com"

# ------------------------------------------------------------------------------
# 主动探测伪装
# 当有人连接但 MTProto 握手失败（密钥错误）时，
# 他们可能是 ISP 主动探测器，测试这是否是代理。
#
# mask = false: 断开连接（探测器知道这里有东西）
# mask = true:  透明代理到 mask_host（探测器看到真实网站）
#
# 启用 mask 后，你的服务器对没有正确密钥的人来说
# 与真实网站服务器无法区分。
# ------------------------------------------------------------------------------

mask = true

# 转发失败握手的真实网站服务器。
# 如果省略，默认为 tls_domain。
# mask_host = "www.google.com"

# mask 主机上的连接端口。
mask_port = 443

# 转发到 mask 主机时注入 PROXY 协议头。
# 0 = 禁用, 1 = v1, 2 = v2。除非 mask_host 需要，否则保持禁用。
# mask_proxy_protocol = 0

# ------------------------------------------------------------------------------
# TLS 证书模拟
# ------------------------------------------------------------------------------

# 本地生成的假 TLS 证书大小（字节）。
# 仅在禁用 tls_emulation 时使用。
fake_cert_len = 2048

# 杀手级功能：实时 TLS 模拟。
# Telemt 连接到 tls_domain，获取其实际 TLS 1.3 证书链，
# 并精确复制 ServerHello 和 Certificate 记录的字节大小。
# 击败使用 TLS 记录长度启发式来检测代理的 DPI。
# 在审查环境中强烈推荐。
tls_emulation = true

# 缓存获取的 TLS 证书的目录。
tls_front_dir = "tlsfront"

# ------------------------------------------------------------------------------
# ServerHello 时序
# 真实网站服务器由于网络延迟和加密处理需要 30-150ms 才能
# 响应 ClientHello。代理在 <1ms 内响应是可疑的。
# 这些设置添加逼真的延迟以模拟真正的服务器行为。
# ------------------------------------------------------------------------------

# 发送 ServerHello 前的最小延迟（毫秒）。
server_hello_delay_min_ms = 50

# 发送 ServerHello 前的最大延迟（毫秒）。
server_hello_delay_max_ms = 150

# ------------------------------------------------------------------------------
# TLS 会话票据
# 真实 TLS 1.3 服务器在握手后发送 1-2 个 NewSessionTicket 消息。
# 发送零票据的服务器是异常的，可能触发 DPI 标志。
# 设置为匹配你的 tls_domain 的行为（通常为 2）。
# ------------------------------------------------------------------------------

# tls_new_session_tickets = 0

# ------------------------------------------------------------------------------
# 完整证书频率
# 启用 tls_emulation 时，控制每个客户端 IP
# 发送完整模拟证书链的频率。
#
# > 0: TTL 秒内的后续连接获得较小的缓存版本。
#       节省带宽但在首次和重复连接之间创建可检测的大小差异。
#
# = 0: 每个连接都获得完整证书。更多带宽但
#       行为完全一致，DPI 无异常可检测。
# ------------------------------------------------------------------------------

tls_full_cert_ttl_secs = 0

# ------------------------------------------------------------------------------
# ALPN 强制
# 确保 ServerHello 以客户端请求的确切 ALPN 协议响应。
# 不匹配的 ALPN（如客户端请求 h2，服务器回复 http/1.1）是 DPI 红旗。
# ------------------------------------------------------------------------------

alpn_enforce = true


# ==============================================================================
# 访问控制 & 用户
# ==============================================================================

[access]

# ------------------------------------------------------------------------------
# 重放攻击防护
# DPI 可以记录合法用户的握手并稍后重放以探测
# 服务器是否是代理。Telemt 记住最近的握手随机数
# 并拒绝重复的。
# ------------------------------------------------------------------------------

# 重放检测缓冲区中的随机数槽数。
replay_check_len = 65536

# 随机数过期前的记忆时间（秒）。
replay_window_secs = 1800

# 允许系统时钟不正确的客户端连接。
# false = 拒绝时间偏差显著的客户端（更安全）
# true  = 接受任何人，不管时钟（更宽松）
ignore_time_skew = false

# ------------------------------------------------------------------------------
# 用户密钥
# 每个用户需要一个唯一的 32 字符 HEX 字符串作为密钥。
# 生成方式：openssl rand -hex 16
#
# 此密钥嵌入 tg:// 链接中。拥有它的人可以连接。
# 格式：用户名 = "hex_密钥"
# ------------------------------------------------------------------------------

[access.users]
# alice = "0123456789abcdef0123456789abcdef"
# bob = "fedcba9876543210fedcba9876543210"

# ------------------------------------------------------------------------------
# 每用户连接限制
# 限制每个用户的并发 TCP 连接数以防止密钥共享。
# 根据需要取消注释并为每个用户设置。
# ------------------------------------------------------------------------------

[access.user_max_tcp_conns]
# alice = 100
# bob = 50

# ------------------------------------------------------------------------------
# 每用户过期日期
# 在指定日期后自动撤销访问权限（ISO 8601 格式）。
# ------------------------------------------------------------------------------

[access.user_expirations]
# alice = "2025-12-31T23:59:59Z"
# bob = "2026-06-15T00:00:00Z"

# ------------------------------------------------------------------------------
# 每用户数据配额
# 每个用户的最大传输总字节数。超限后拒绝连接。
# ------------------------------------------------------------------------------

[access.user_data_quota]
# alice = 107374182400
# bob = 53687091200

# ------------------------------------------------------------------------------
# 每用户唯一 IP 限制
# 可以同时使用此密钥的不同 IP 地址的最大数量。
# 对防止密钥泄露/共享非常有效。
# 设为 1 表示单设备，2-3 表示手机+电脑等。
# ------------------------------------------------------------------------------

[access.user_max_unique_ips]
# alice = 3
# bob = 2


# ==============================================================================
# 上游路由
# 控制 Telemt 如何连接到 Telegram 服务器（或 ME 服务器）。
# 如果完全省略，使用操作系统默认路由。
# ==============================================================================

# ------------------------------------------------------------------------------
# 直连上游：使用服务器自身的网络接口。
# 可以选择绑定到特定接口或本地 IP。
# ------------------------------------------------------------------------------

# [[upstreams]]
# type = "direct"
# interface = "eth0"
# bind_addresses = ["192.0.2.10"]
# weight = 1
# enabled = true
# scopes = "*"

# ------------------------------------------------------------------------------
# SOCKS5 上游：通过 SOCKS5 代理路由 Telegram 流量。
# 当你的服务器 IP 被禁止访问 Telegram DC 时有用。
# ------------------------------------------------------------------------------

# [[upstreams]]
# type = "socks5"
# address = "198.51.100.30:1080"
# username = "proxy-user"
# password = "proxy-pass"
# weight = 1
# enabled = true


# ==============================================================================
# 数据中心覆盖
# 强制特定 DC ID 路由到特定 IP:Port 组合。
# DC 203 (CDN) 如果未在此指定，由 Telemt 自动注入。
# ==============================================================================

# [dc_overrides]
# "201" = "149.154.175.50:443"
# "202" = ["149.154.167.51:443", "149.154.175.100:443"]
