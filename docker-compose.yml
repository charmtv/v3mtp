services:
  telemt:
    image: ghcr.io/charmtv/v3mtp:latest
    build: .
    container_name: telemt
    restart: unless-stopped
    ports:
      - "443:443"
      - "9090:9090"
    # 允许在只读容器中缓存 'proxy-secret'
    working_dir: /run/telemt
    volumes:
      - ./config.toml:/run/telemt/config.toml:ro
    tmpfs:
      - /run/telemt:rw,mode=1777,size=1m
    environment:
      - RUST_LOG=info
    # 如果需要使用主机网络进行 IPv6，请取消注释此行，但桥接模式是默认且通常更好的选择
    # network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # 允许绑定 443 端口
    read_only: true
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
